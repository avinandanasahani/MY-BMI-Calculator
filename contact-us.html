<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - GOVT ITI Balasore Hub</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; color: #333; margin: 0; padding: 40px 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h1 { color: #1e3a8a; text-align: center; margin-top: 0; }
        p.subtitle { text-align: center; color: #666; margin-bottom: 30px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #444; }
        input[type="text"], input[type="email"], textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 15px; font-family: inherit; }
        input:focus, textarea:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 5px rgba(37,99,235,0.2); }
        textarea { resize: vertical; min-height: 120px; }
        
        button { width: 100%; padding: 14px; background-color: #2563eb; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #1e40af; }

        .contact-info { margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; text-align: center; font-size: 14px; color: #555; }
        .contact-info a { color: #2563eb; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Contact Us</h1>
    <p class="subtitle">Have a question or feedback about our calculators? Drop us a message!</p>

    <form action="mailto:youremail@gmail.com" method="POST" enctype="text/plain">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="Name" placeholder="Enter your name" required>
        </div>
        
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="Email" placeholder="Enter your email" required>
        </div>
        
        <div class="form-group">
            <label for="message">Your Message</label>
            <textarea id="message" name="Message" placeholder="How can we help you?" required></textarea>
        </div>
        
        <button type="submit">Send Message</button>
    </form>

    <div class="contact-info">
        <p><strong>GOVT ITI Balasore Hub</strong></p>
        <p>Managed by: Avinandana Sahani</p>
        <p>Email: <a href="mailto:avinandanasahani777.com">avinandanasahani777.com</a></p>
    </div>
</div>

</body>
</html>
